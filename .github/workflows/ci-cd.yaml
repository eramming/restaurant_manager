name: Build and deploy Restaurant Ingredient Inventory System

on:
  push:
    branches: [gen2]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  EKS_CLUSTER_NAME: riis-cluster
  ECR_REGISTRY: 929170595454.dkr.ecr.us-east-2.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::929170595454:role/github-actions-riis-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push SalesInventoryManager
        run: |
          docker build \
            -f sales_inventory_manager/Dockerfile \
            -t $ECR_REGISTRY/sales-inventory-manager:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/sales-inventory-manager:${{ github.sha }}

      - name: Build and push SupplyGapAnalyzer
        run: |
          docker build \
            -f supply_gap_analyzer/Dockerfile \
            -t $ECR_REGISTRY/supply-gap-analyzer:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/supply-gap-analyzer:${{ github.sha }}

      - name: Build and push PricingAnalyzer
        run: |
          docker build -t $ECR_REGISTRY/pricing-analyzer:${{ github.sha }} ./PricingAnalyzer
          docker build \
            -f pricing_analyzer/Dockerfile \
            -t $ECR_REGISTRY/pricing-analyzer:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/pricing-analyzer:${{ github.sha }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/sales-inventory-manager \
            sales-inventory-manager=$ECR_REGISTRY/sales-inventory-manager:${{ github.sha }}

          kubectl set image deployment/supply-gap-analyzer \
            supply-gap-analyzer=$ECR_REGISTRY/supply-gap-analyzer:${{ github.sha }}

          kubectl set image deployment/pricing-analyzer \
            pricing-analyzer=$ECR_REGISTRY/pricing-analyzer:${{ github.sha }}